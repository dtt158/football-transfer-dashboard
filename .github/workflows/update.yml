name: Update transfer dashboard

on:
  schedule:
    - cron: "7 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Collect transfer data
        run: python scripts/fetch_transfers.py
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_TRANSLATION_MODEL: ${{ vars.DEEPSEEK_TRANSLATION_MODEL }}

      - name: Commit updated caches
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/entity_cache.json data/translation_cache.json data/player_cache.json
          git diff --cached --quiet || git commit -m "chore: update data caches [skip ci]"
          git push || true

      - name: Prepare site artifact
        run: |
          mkdir _site
          cp index.html styles.css script.js _site/
          cp -r data _site/data

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
